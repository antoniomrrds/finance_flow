version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: financeflow_postgres
    restart: always
    environment:
      POSTGRES_DB: financeflow_db
      POSTGRES_USER: financeflow_user
      POSTGRES_PASSWORD: financeflow_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - financeflow_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U financeflow_user -d financeflow_db"]
      interval: 30s
      retries: 3
      start_period: 10s
      timeout: 10s

volumes:
  postgres_data:

networks:
  financeflow_net:
    driver: bridge